<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Iluminación Perimetral</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        padding:20px;
    }

    h1{
        text-align:center;
        color:#333;
    }

    form{
        background:white;
        padding:20px;
        border-radius:10px;
        max-width:900px;
        margin:auto;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .grupo{
        margin-bottom:15px;
    }

    label{
        font-weight:bold;
        display:block;
        margin-bottom:5px;
    }

    input, select, textarea{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        box-sizing:border-box;
    }

    button{
        background:#007BFF;
        color:white;
        padding:12px;
        border:none;
        border-radius:5px;
        cursor:pointer;
        width:100%;
        font-size:16px;
    }

    button:hover{
        background:#0056b3;
    }
</style>
</head>

<body>

<h1>Hoja de Verificación de Iluminación</h1>

<form id="formulario">

    <div class="grupo">
        <label>Ubicación</label>
        <input type="text" id="ubicacion" required>
    </div>

    <div class="grupo">
        <label>Tipo de luminaria</label>
        <input type="text" id="tipo">
    </div>

    <div class="grupo">
        <label>Potencia (W)</label>
        <input type="number" id="potencia">
    </div>

    <div class="grupo">
        <label>Estado actual</label>
        <select id="estado">
            <option>Bueno</option>
            <option>Regular</option>
            <option>Malo</option>
        </select>
    </div>

    <div class="grupo">
        <label>¿Enciende correctamente?</label>
        <select id="enciende">
            <option>Sí</option>
            <option>No</option>
        </select>
    </div>

    <div class="grupo">
        <label>¿Presenta parpadeo?</label>
        <select id="parpadeo">
            <option>No</option>
            <option>Sí</option>
        </select>
    </div>

    <div class="grupo">
        <label>¿Daño físico visible?</label>
        <select id="danio">
            <option>No</option>
            <option>Sí</option>
        </select>
    </div>

    <div class="grupo">
        <label>¿Requiere sustitución?</label>
        <select id="sustitucion">
            <option>No</option>
            <option>Sí</option>
        </select>
    </div>

    <div class="grupo">
        <label>Tipo de mantenimiento</label>
        <select id="mantenimiento">
            <option>Preventivo</option>
            <option>Correctivo</option>
        </select>
    </div>

    <div class="grupo">
        <label>Observaciones</label>
        <textarea id="observaciones" rows="4"></textarea>
    </div>

    <div class="grupo">
        <label>Responsable</label>
        <input type="text" id="responsable">
    </div>

    <button type="submit">Enviar Registro</button>
</form>

<script>
document.getElementById("formulario").addEventListener("submit", function(e){
    e.preventDefault();

    const urlAppsScript = "https://script.google.com/macros/s/AKfycbxaLngZtPhI6UVcCPFusRpf5_S6ElRgyW7HQ3rDgLzn-EB_xPa9IyR6Pc679-7X6prJAA/exec";

    const datos = new URLSearchParams();
    datos.append("ubicacion", document.getElementById("ubicacion").value);
    datos.append("tipo", document.getElementById("tipo").value);
    datos.append("potencia", document.getElementById("potencia").value);
    datos.append("estado", document.getElementById("estado").value);
    datos.append("enciende", document.getElementById("enciende").value);
    datos.append("parpadeo", document.getElementById("parpadeo").value);
    datos.append("danio", document.getElementById("danio").value);
    datos.append("sustitucion", document.getElementById("sustitucion").value);
    datos.append("mantenimiento", document.getElementById("mantenimiento").value);
    datos.append("observaciones", document.getElementById("observaciones").value);
    datos.append("responsable", document.getElementById("responsable").value);

    fetch(urlAppsScript, {
        method: "POST",
        mode: "no-cors",
        body: datos
    })
    .then(() => {
        alert("Datos enviados correctamente");
        document.getElementById("formulario").reset();
    })
    .catch((error) => {
        alert("Error al enviar datos");
        console.log(error);
    });
});
</script>
